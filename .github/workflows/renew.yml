name: Katabump Auto Renew

on:
  schedule:
    # 每天 HKT 2:30 PM (UTC 6:30 AM) 运行
    - cron: '30 6 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # (1) Added NPM caching
        
    - name: 📦 Install Dependencies
      run: |
        npm install
        # (2) Optimized: Removed 'sudo apt-get update' and redundant installs.
        # playwright install-deps ensures minimal required system libraries for the browser.
        npx playwright install-deps chromium
      
    - name: 🚀 Run Renew Script
      env:
        # 将 USERS_JSON 配置在 GitHub Repository Secrets 中
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        PUSHDEER_SENDKEY: ${{ secrets.PUSHDEER_SENDKEY }}
        PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
      # 使用 xvfb-run 模拟有头环境运行
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

    - name: 📸 Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
